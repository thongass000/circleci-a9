name: Build LineageOS 18.1 (a9y18qlte)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      USE_CCACHE: "1"
      _JAVA_OPTIONS: "-Xmx16g" 
    steps:
      - name: Maximize Disk Space & Setup Swap
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          temp-reserve-mb: 100
          swap-size-mb: 12288
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Install Dependencies & Fix Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository universe -y
          sudo add-apt-repository ppa:deadsnakes/ppa -y
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libstdc++6 git python3 libssl-dev repo ccache rsync wget libncurses5 libncurses5-dev imagemagick openjdk-11-jdk
          sudo apt-get install -y python2.7
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python2
          sudo ln -sf /usr/bin/python2.7 /usr/bin/python
          git config --global user.name "jamesnguyen"
          git config --global user.email "jamesnguyen@local"

      - name: Setup CCache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-a9y18qlte-17.1-${{ github.run_id }}
          restore-keys: |
            ccache-a9y18qlte-17.1-

      - name: Initialize Repo, Inject Manifest & Sync
        run: |
          mkdir -p ~/android && cd ~/android
          repo init -u https://github.com/LineageOS/android.git -b lineage-17.1 --depth=1
          mkdir -p .repo/local_manifests
          cat << 'EOF' > .repo/local_manifests/roomservice.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <remote name="a9" fetch="https://github.com/a9y18qlte-open" revision="lineage-17.1" />
            <remote name="los" fetch="https://github.com/LineageOS" revision="lineage-17.1" />
            <project path="device/samsung/sdm660-common" name="device_samsung_sdm660-common" remote="a9" revision="lineage-17.1" />
            <project path="device/samsung/a9y18qlte" name="device_samsung_a9y18qlte" remote="a9" revision="lineage-17.1" />
            <project path="kernel/samsung/sdm660" name="kernel_samsung_sdm660" remote="a9" revision="CAF" />
            <project path="vendor/samsung/sdm660" name="vendor_samsung_sdm660-common" remote="a9" revision="lineage-17.1" />
            <project path="hardware/qcom-caf/sdm660/display" name="android_hardware_qcom_display" groups="pdk-qcom,sdm660" remote="los" />
            <project path="hardware/qcom-caf/sdm660/audio" name="android_hardware_qcom_audio" groups="pdk-qcom,sdm660" remote="los" />
            <project path="hardware/qcom-caf/sdm660/media" name="android_hardware_qcom_media" groups="pdk-qcom,sdm660" remote="los" />
            <project path="device/samsung_slsi/sepolicy" name="android_device_samsung_slsi_sepolicy" remote="los" />
            <project path="hardware/samsung" name="android_hardware_samsung" remote="los" />
          </manifest>
          EOF
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune

      - name: Build ROM
        run: |
          cd ~/android
          export CCACHE_EXEC=/usr/bin/ccache
          export CCACHE_DIR=~/.ccache
          ccache -M 50G
          source build/envsetup.sh
          export WITH_DEXPREOPT=false
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch lineage_a9y18qlte-userdebug
          mka bacon -j$(nproc --all)

      - name: Upload Build to Transfer.sh
        if: success()
        run: |
          cd ~/android/out/target/product/a9y18qlte/
          ZIP_FILE=$(find . -maxdepth 1 -name "lineage-*.zip" -type f | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            curl --upload-file "$ZIP_FILE" https://transfer.sh/$(basename "$ZIP_FILE")
          else
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: LineageOS-17.1-a9y18qlte
          path: ~/android/out/target/product/a9y18qlte/lineage-*.zip
          retention-days: 3
